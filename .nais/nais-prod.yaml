apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: reops-umami-consumer
  namespace: team-researchops
  labels:
    team: team-researchops
spec:
  image: "{{ image }}"
  port: 8080
  liveness:
    path: /internal/health
    initialDelay: 30
  readiness:
    path: /internal/health
    initialDelay: 5
  replicas:
    min: 1
    max: 4
    cpuThresholdPercentage: 80
  prometheus:
    enabled: true
    path: /internal/prometheus
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: "200m"
      memory: 512Mi
  kafka:
    pool: nav-prod
  accessPolicy:
    outbound:
      rules:
        - application: umami-dev
      external:
        - host: nav-prod-kafka-nav-prod.aivencloud.com
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: kubernetes
    - name: REOPS_UMAMI_URL
      value: umami-dev.team-researchops.svc.cluster.local
    - name: JAVA_TOOL_OPTIONS
      value: >-
        -XX:+UseZGC
        -XX:MaxRAMPercentage=70
        -XX:InitialRAMPercentage=50
        -XX:+ExitOnOutOfMemoryError
